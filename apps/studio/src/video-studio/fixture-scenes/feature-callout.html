<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0f0f13;
        --bg-card: #1a1a24;
        --text: #e8e8f0;
        --text-dim: #8888a0;
        --accent: #60a5fa;
        --border: #2a2a3a;
        --font-display: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --font-body: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      .scene {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 4vh;
        padding: 8vw;
        box-sizing: border-box;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        text-align: center;
      }
      .eyebrow {
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-size: 3.2vw;
        color: var(--text-dim);
      }
      .panel {
        border: 2px solid var(--border);
        border-radius: 2vw;
        background: var(--bg-card);
        display: grid;
        place-items: center;
        color: var(--text-dim);
        font-size: 4vw;
      }
      .caption {
        margin: 0;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 7vw;
        line-height: 1.05;
      }
      .accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <div class="eyebrow">The feature</div>
      <div class="panel">placeholder shot</div>
      <p class="caption">One accent word <span class="accent">lands</span></p>
    </section>
  </body>
</html>
