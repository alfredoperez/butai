<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0f0f13;
        --text: #e8e8f0;
        --text-dim: #8888a0;
        --accent: #60a5fa;
        --font-display: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --font-body: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      .scene {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 3vh;
        padding: 8vw;
        box-sizing: border-box;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        text-align: center;
      }
      .wordmark {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 9vw;
        color: var(--accent);
      }
      .cta {
        margin: 0;
        font-size: 4.5vw;
        line-height: 1.3;
      }
      .follow {
        font-size: 3.4vw;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <div class="wordmark">example.com</div>
      <p class="cta">Try it in a minute.<br />No account required.</p>
      <div class="follow">follow for more</div>
    </section>
  </body>
</html>
