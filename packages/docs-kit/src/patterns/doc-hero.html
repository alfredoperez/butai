<!doctype html>
<!--
  doc-hero.html — framework-free butai doc pattern (header).
  The opener of a brief or report: a mono eyebrow, one tight display headline
  with a single accent word, a one-line summary, and a meta row of date +
  status badges.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      /* ---- built-in fallback tokens (a theme overrides these) ---- */
      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        /* page-local design constants (derived from contract vars / fixed radii) */
        --chip: var(--bg-nav);
        --r-sm: 8px; --r-md: 16px; --r-pill: 999px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .doc-hero .meta {
        display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
        color: var(--text-dim); font-size: 13px; margin-bottom: 14px;
      }
      .badge {
        display: inline-block; font: 700 11px/1 var(--font-mono);
        text-transform: uppercase; letter-spacing: 0.5px;
        padding: 5px 11px; border-radius: var(--r-pill);
      }
      .badge.is-shipped { color: var(--green); background: var(--green-dim); }
      .badge.is-planned { color: var(--yellow); background: var(--yellow-dim); }

      .doc-hero .eyebrow {
        font: 600 12px/1.2 var(--font-mono); text-transform: uppercase;
        letter-spacing: 1.4px; color: var(--accent); margin-bottom: 16px;
      }
      .doc-hero h1 {
        margin: 0 0 12px; font: 500 40px/1.05 var(--font-display);
        letter-spacing: -0.8px; text-wrap: balance;
      }
      /* the single accent word — a theme repaints it (the restyle proof) */
      .doc-hero h1 .accent { color: var(--accent); }
      .doc-hero .sub {
        margin: 0; max-width: 640px; color: var(--text-dim);
        font-size: 16px; text-wrap: balance;
      }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .doc-hero h1 { font-size: 30px; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <header class="doc-hero">
        <div class="meta">
          <span>2026-01-01</span> ·
          <span class="badge is-shipped">shipped</span>
          <span class="badge is-planned">v2 planned</span>
        </div>
        <div class="eyebrow">Example.com · Report</div>
        <h1>One tight headline, <span class="accent">one clear idea</span></h1>
        <p class="sub">A one-line summary of what this document argues, in plain language a non-engineer can follow.</p>
      </header>
    </main>
  </body>
</html>
