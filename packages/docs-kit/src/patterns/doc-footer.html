<!doctype html>
<!--
  doc-footer.html — framework-free butai doc pattern (closing).
  The close: a "what's next" band with a call to action, plus a muted footer
  meta line. Ends the document with forward momentum, not a summary.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-md: 16px; --r-lg: 22px; --r-pill: 999px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .doc-footer .band {
        border-radius: var(--r-lg); padding: 26px 28px;
        background: linear-gradient(140deg,
          color-mix(in srgb, var(--green) 78%, #000),
          color-mix(in srgb, var(--green) 58%, #000));
        border: 1px solid var(--green);
        display: flex; align-items: center; justify-content: space-between;
        gap: 18px; flex-wrap: wrap;
      }
      .doc-footer .band h3 {
        margin: 0 0 4px; font: 500 22px/1.2 var(--font-display);
        letter-spacing: -0.3px; color: #fff;
      }
      .doc-footer .band p { margin: 0; color: #fff; opacity: 0.82; font-size: 14px; }
      .doc-footer .btn {
        display: inline-block; font: 600 14px var(--font-body);
        padding: 11px 22px; border-radius: var(--r-pill);
        background: #fff; color: #10231b; white-space: nowrap;
      }
      .doc-footer .foot {
        margin-top: 18px; padding-top: 16px;
        border-top: 1px solid var(--border);
        display: flex; gap: 14px; flex-wrap: wrap;
        color: var(--text-dim); font-size: 12.5px;
      }
      .doc-footer .foot a { color: var(--blue); text-decoration: none; }
      .doc-footer .foot a:hover { text-decoration: underline; }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .doc-footer .band { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <footer class="doc-footer">
        <div class="band">
          <div>
            <h3>What happens next</h3>
            <p>Pick the patterns you need and compose the next document.</p>
          </div>
          <a class="btn" href="https://example.com">Get started</a>
        </div>
        <div class="foot">
          <span>Last updated 2026-01-01</span> ·
          <span><a href="https://example.com">example.com</a></span> ·
          <span>Built with the token contract</span>
        </div>
      </footer>
    </main>
  </body>
</html>
