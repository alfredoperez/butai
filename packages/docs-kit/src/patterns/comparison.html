<!doctype html>
<!--
  comparison.html — framework-free butai doc pattern (data).
  A side-by-side pair: a "before/other" side (warm accent tint) versus an
  "after/ours" side (green tint), each with a mono label. The core "X vs Y"
  device.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-md: 16px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .side {
        border-radius: var(--r-md); padding: 16px 18px; font-size: 14px;
        color: var(--text-dim);
      }
      /* the two sides tint the status palette — a theme repaints both */
      .side.a { background: var(--red-dim); border: 1px solid var(--red); }
      .side.b { background: var(--green-dim); border: 1px solid var(--green); }
      .side .lbl {
        display: block; margin-bottom: 8px;
        font: 700 11px/1.3 var(--font-mono); text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .side.a .lbl { color: var(--red); }
      .side.b .lbl { color: var(--green); }
      .side p { margin: 0; }
      .side b { color: var(--text); font-weight: 600; }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .pair { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="pair">
        <div class="side a">
          <span class="lbl">Before</span>
          <p>Every doc was <b>hand-styled</b>, so a rebrand meant editing each file by hand.</p>
        </div>
        <div class="side b">
          <span class="lbl">After</span>
          <p>Docs read their color from <b>one token set</b>, so a theme repaints all of them at once.</p>
        </div>
      </div>
    </main>
  </body>
</html>
