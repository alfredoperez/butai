<!doctype html>
<!--
  data-table.html — framework-free butai doc pattern (data).
  A full-width comparison table: hairline rows, uppercase-mono headers, and two
  tinted compared columns (one muted, one in a status color).

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-md: 16px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .table-wrap {
        border: 1px solid var(--border); border-radius: var(--r-md);
        overflow-x: auto; background: var(--bg-card);
      }
      table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
      th, td {
        text-align: left; vertical-align: top; padding: 11px 14px;
        border-bottom: 1px solid var(--border);
      }
      tr:last-child td { border-bottom: 0; }
      th {
        color: var(--text-dim); font: 700 11px/1.3 var(--font-mono);
        text-transform: uppercase; letter-spacing: 0.6px;
      }
      td b { color: var(--text); font-weight: 600; }
      /* the two compared columns get tinted ink — a theme repaints the palette */
      td.a { color: var(--text-dim); }
      td.b { color: var(--green); }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Capability</th><th>Baseline</th><th>This approach</th></tr>
          </thead>
          <tbody>
            <tr><td><b>Restyle by theme</b></td><td class="a">manual edits</td><td class="b">one token swap</td></tr>
            <tr><td><b>Build step</b></td><td class="a">required</td><td class="b">none</td></tr>
            <tr><td><b>Offline render</b></td><td class="a">breaks on CDN</td><td class="b">self-contained</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
