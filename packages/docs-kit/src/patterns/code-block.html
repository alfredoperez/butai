<!doctype html>
<!--
  code-block.html — framework-free butai doc pattern (code).
  A terminal window plus a code viewer, both HAND-HIGHLIGHTED with span classes
  (no highlight.js, no CDN). The terminal shows a command session; the viewer
  shows a focused source excerpt with a filename tab and line numbers.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        /* page-local: the darkest console surface derives from the page ground */
        --mock-bg: var(--bg); --r-md: 12px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      /* terminal window */
      .term {
        background: var(--mock-bg); border: 1px solid var(--border);
        border-radius: var(--r-md); overflow: hidden; margin-bottom: 16px;
      }
      .term .bar {
        display: flex; align-items: center; gap: 7px;
        padding: 9px 13px; background: var(--bg-nav);
        border-bottom: 1px solid var(--border);
      }
      .term .bar i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
      .term .bar .t { margin-left: 9px; font: 11px var(--font-mono); color: var(--text-dim); }
      .term .body {
        padding: 14px 16px; font: 12.5px/1.75 var(--font-mono);
        white-space: pre-wrap; color: var(--text-dim);
      }
      /* hand-highlight spans — each maps to a contract token so a theme repaints them */
      .term .p { color: var(--accent); }
      .term .cmd { color: var(--text); }
      .term .ok { color: var(--green); }
      .term .ar { color: var(--accent); }
      .term .pa { color: var(--blue); }
      .term .o { color: var(--text-dim); }
      .term .er { color: var(--red); }

      /* code viewer */
      .code {
        background: var(--mock-bg); border: 1px solid var(--border);
        border-radius: var(--r-md); overflow: hidden;
      }
      .code .tabs { display: flex; background: var(--bg-nav); border-bottom: 1px solid var(--border); }
      .code .tab {
        padding: 8px 15px; font: 11px var(--font-mono); color: var(--text-dim);
        border-right: 1px solid var(--border);
      }
      .code .tab.on { color: var(--text); border-top: 2px solid var(--accent); }
      .code .src { display: flex; overflow-x: auto; }
      .code pre { margin: 0; font: 12.5px/1.8 var(--font-mono); }
      .code .ln {
        padding: 13px 12px; text-align: right; color: var(--text-dim);
        border-right: 1px solid var(--border); background: var(--bg-nav); user-select: none;
      }
      .code .lines { padding: 13px 16px; color: var(--text-dim); }
      .code .kw { color: var(--blue); }
      .code .fn { color: var(--accent); }
      .code .str { color: var(--green); }
      .code .com { color: var(--text-dim); font-style: italic; }
      .code .key { color: var(--accent); }

      @media (max-width: 760px) { .doc { padding: 32px 18px; } }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="term">
        <div class="bar">
          <i style="background:#ff5f56"></i><i style="background:#ffbd2e"></i><i style="background:#27c93f"></i>
          <span class="t">shell — project</span>
        </div>
        <div class="body"><span class="p">$</span> <span class="cmd">docs gen</span>
<span class="ok">&#10003;</span> <span class="o">cataloged 12 patterns</span>
<span class="ar">&#8594;</span> wrote <span class="pa">catalog/catalog.json</span>
<span class="ok">&#10003;</span> <span class="o">registry index up to date</span></div>
      </div>
      <div class="code">
        <div class="tabs"><span class="tab on">gen.ts</span><span class="tab">index.ts</span></div>
        <div class="src">
          <pre class="ln">31
32
33</pre>
          <pre class="lines"><span class="kw">export function</span> <span class="fn">buildCatalog</span>() {
  <span class="com">// deterministic: no timestamps, sorted</span>
  <span class="kw">return</span> <span class="fn">generateCatalog</span>(<span class="str">metas</span>);
}</pre>
        </div>
      </div>
    </main>
  </body>
</html>
