<!doctype html>
<!--
  card-grid.html — framework-free butai doc pattern (content).
  A responsive grid of cards, each a title row with status badges, a body, and
  a muted meta footer. The default unit for "a titled item with tags and a note"
  (a feature, an option, a risk).

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-md: 16px; --r-pill: 999px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .grid { display: grid; gap: 14px; }
      .cols-2 { grid-template-columns: repeat(2, 1fr); }
      .cols-3 { grid-template-columns: repeat(3, 1fr); }

      .card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--r-md); padding: 18px 20px;
      }
      .card-head {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .card-head h3 {
        margin: 0; font: 600 16px/1.25 var(--font-display); letter-spacing: -0.1px;
      }
      .card p { margin: 0; color: var(--text-dim); font-size: 14px; }
      .card-meta {
        margin-top: 12px; font-size: 12.5px; color: var(--text-dim);
      }
      .card-meta b { color: var(--text); font-weight: 600; }

      .badge {
        display: inline-block; font: 700 11px/1 var(--font-mono);
        text-transform: uppercase; letter-spacing: 0.5px;
        padding: 4px 10px; border-radius: var(--r-pill);
      }
      .badge.is-shipped { color: var(--green); background: var(--green-dim); }
      .badge.is-planned { color: var(--yellow); background: var(--yellow-dim); }
      .badge.is-info { color: var(--blue); background: var(--blue-dim); }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .cols-2, .cols-3 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="grid cols-3">
        <div class="card">
          <div class="card-head"><h3>First item</h3><span class="badge is-shipped">shipped</span></div>
          <p>A plain-English line on what this item is and why it matters.</p>
          <div class="card-meta">Owner · <b>Team A</b></div>
        </div>
        <div class="card">
          <div class="card-head"><h3>Second item</h3><span class="badge is-planned">planned</span></div>
          <p>Another card, same shape. Status is tagged, not implied.</p>
          <div class="card-meta">Owner · <b>Team B</b></div>
        </div>
        <div class="card">
          <div class="card-head"><h3>Third item</h3><span class="badge is-info">next</span></div>
          <p>The grid collapses to one column on a phone.</p>
          <div class="card-meta">Owner · <b>Team C</b></div>
        </div>
      </div>
    </main>
  </body>
</html>
