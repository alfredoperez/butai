<!doctype html>
<!--
  quote-band.html — framework-free butai doc pattern (emphasis).
  A full-bleed brand band holding one pull-quote: light text on a tinted accent
  surface. Use at most once or twice per document, for the thesis or a turn.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-lg: 22px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .quote-band {
        border-radius: var(--r-lg); padding: 32px 34px;
        /* the band surface is the accent deepened; light ink sits on top.
           color-mix keeps it themed — override --accent and the band repaints. */
        background: linear-gradient(140deg,
          color-mix(in srgb, var(--accent) 82%, #000),
          color-mix(in srgb, var(--accent) 62%, #000));
        border: 1px solid var(--accent);
      }
      .quote-band .mark {
        font: 700 11px/1 var(--font-mono); text-transform: uppercase;
        letter-spacing: 1.2px; color: #fff; opacity: 0.72; margin-bottom: 14px;
      }
      .quote-band blockquote {
        margin: 0; color: #fff; font: 500 26px/1.3 var(--font-display);
        letter-spacing: -0.4px; text-wrap: balance;
      }
      .quote-band .cite {
        margin-top: 16px; font-size: 13px; color: #fff; opacity: 0.78;
      }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .quote-band { padding: 24px 22px; }
        .quote-band blockquote { font-size: 21px; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <figure class="quote-band">
        <div class="mark">The turn</div>
        <blockquote>Same markup, different tokens: a theme repaints the whole document without touching a line of content.</blockquote>
        <figcaption class="cite">example.com · design notes</figcaption>
      </figure>
    </main>
  </body>
</html>
