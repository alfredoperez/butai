<!doctype html>
<!--
  callout.html — framework-free butai doc pattern (emphasis).
  The thesis highlight: a faint accent wash behind a 1px accent border, holding
  the one line the reader should leave with.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        /* page-local: the callout wash tints the accent; radius is a fixed constant */
        --r-lg: 22px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .callout {
        margin: 8px 0; padding: 18px 22px; border-radius: var(--r-lg);
        /* the faint wash + border both derive from the accent → a theme repaints them */
        background: linear-gradient(180deg, var(--accent-glow), transparent);
        border: 1px solid var(--accent);
        color: var(--text-dim); font-size: 16px; line-height: 1.55;
      }
      .callout .lbl {
        display: inline-block; margin-right: 8px;
        font: 700 11px/1 var(--font-mono); text-transform: uppercase;
        letter-spacing: 0.6px; color: var(--accent);
      }
      .callout b { color: var(--text); font-weight: 600; }

      @media (max-width: 760px) { .doc { padding: 32px 18px; } }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="callout">
        <span class="lbl">Thesis</span>
        <b>The single sentence the reader should leave with.</b> Everything else
        in the document exists to support this one claim.
      </div>
    </main>
  </body>
</html>
