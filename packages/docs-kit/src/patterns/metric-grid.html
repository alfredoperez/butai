<!doctype html>
<!--
  metric-grid.html — framework-free butai doc pattern (data).
  A trio of counted stat cards: a mono kicker, a big number in a status color,
  and a caption. The scannable summary after a grouped section.

  Styling is the butai TOKEN CONTRACT (CSS custom properties). The :root block
  below is a SELF-CONTAINED FALLBACK so the fragment renders standalone and
  offline (no CDN, system-font fallbacks). A theme restyles it by overriding
  these same vars on :root / [data-theme] — same HTML, different render.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #0f0f13; --bg-card: #16161d; --bg-nav: #1c1d24;
        --text: #e9e9f2; --text-dim: #8a8a9c; --border: #2a2a3a;
        --accent: #60a5fa; --accent-glow: rgba(96, 165, 250, 0.16);
        --green: #3ecf8e; --green-dim: rgba(62, 207, 142, 0.14);
        --yellow: #e0a52e; --yellow-dim: rgba(224, 165, 46, 0.14);
        --blue: #4c6ee6; --blue-dim: rgba(76, 110, 230, 0.14);
        --red: #ef4444; --red-dim: rgba(239, 68, 68, 0.14); --orange: #f59e0b;
        --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r-md: 16px;
      }

      html, body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.6 var(--font-body); -webkit-font-smoothing: antialiased;
      }
      .doc { max-width: 1000px; margin: 0 auto; padding: 48px 28px; }

      .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .metric {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--r-md); padding: 18px 20px;
      }
      .metric .k {
        display: block; font: 700 11px/1.3 var(--font-mono);
        text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim);
      }
      .metric .n {
        display: block; margin: 8px 0 6px;
        font: 500 34px/1 var(--font-display); letter-spacing: -0.6px;
      }
      /* each number takes a status color — a theme repaints the palette */
      .metric.ok .n { color: var(--green); }
      .metric.warn .n { color: var(--yellow); }
      .metric.info .n { color: var(--blue); }
      .metric p { margin: 0; color: var(--text-dim); font-size: 13px; }

      @media (max-width: 760px) {
        .doc { padding: 32px 18px; }
        .metric-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <div class="metric-grid">
        <div class="metric ok">
          <span class="k">shipped</span>
          <span class="n">12</span>
          <p>patterns cataloged this cycle.</p>
        </div>
        <div class="metric warn">
          <span class="k">planned</span>
          <span class="n">4</span>
          <p>items queued for the next cycle.</p>
        </div>
        <div class="metric info">
          <span class="k">coverage</span>
          <span class="n">98%</span>
          <p>of the surface under test.</p>
        </div>
      </div>
    </main>
  </body>
</html>
