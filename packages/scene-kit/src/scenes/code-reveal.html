<!doctype html>
<!--
  code-reveal.html — framework-free HyperFrames scene (code).
  A mono code block that reveals line by line with ONE highlighted line — the
  payoff. Generic sample code (example.com), no personal or product refs.

  Styled by the butai TOKEN CONTRACT; the :root fallback keeps it standalone
  and offline (system monospace fallback). A theme overrides the vars.
-->
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0f0f13;
        --bg-card: #16161d;
        --text: #e9e9f2;
        --text-dim: #8a8a9c;
        --accent: #60a5fa;
        --accent-glow: rgba(96, 165, 250, 0.18);
        --border: #2a2a3a;
        --yellow: #facc15;
        --green: #34d399;
        --font-display: "Archivo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-body: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: var(--bg); font-family: var(--font-body); color: var(--text);
      }

      .bg {
        position: absolute; inset: 0; opacity: 0.5;
        background:
          radial-gradient(120% 75% at 50% 42%, transparent 45%, rgba(0, 0, 0, 0.9) 100%),
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 100% 100%, 46px 46px, 46px 46px;
      }

      .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 120px 70px;
      }

      .eyebrow {
        font-family: var(--font-mono); font-size: 28px; font-weight: 600;
        letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
        margin-bottom: 40px; align-self: flex-start;
        animation: fade 0.5s ease-out both;
      }

      .code {
        width: 100%; background: var(--bg-card);
        border: 1px solid var(--border); border-radius: 18px;
        box-shadow: 0 0 0 1px var(--accent-glow), 0 40px 110px rgba(0, 0, 0, 0.55);
        padding: 54px 56px; font-family: var(--font-mono); font-size: 40px; line-height: 1.7;
      }
      .code .ln {
        display: block; white-space: pre; color: var(--text-dim);
        animation: reveal 0.4s ease-out both;
      }
      .code .ln .kw { color: var(--accent); }
      .code .ln .str { color: var(--green); }
      .code .ln:nth-child(1) { animation-delay: 0.15s; }
      .code .ln:nth-child(2) { animation-delay: 0.35s; }
      .code .ln:nth-child(3) { animation-delay: 0.55s; }
      .code .ln:nth-child(4) { animation-delay: 0.75s; }
      .code .ln:nth-child(5) { animation-delay: 0.95s; }
      /* the one highlighted line — the payoff (theme repaints --yellow) */
      .code .ln.hot {
        color: var(--text); border-radius: 8px;
        box-shadow: -18px 0 0 var(--yellow), inset 0 0 0 100vw rgba(250, 204, 21, 0.06);
      }

      @keyframes reveal { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: none; } }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <section class="scene">
      <div class="eyebrow">Code · line by line</div>
      <div class="code">
        <span class="ln"><span class="kw">async function</span> load(id) {</span>
        <span class="ln">  <span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">`https://example.com/api/${id}`</span>);</span>
        <span class="ln hot">  <span class="kw">if</span> (!res.ok) <span class="kw">throw new</span> Error(<span class="str">"not found"</span>);</span>
        <span class="ln">  <span class="kw">return</span> res.json();</span>
        <span class="ln">}</span>
      </div>
    </section>
  </body>
</html>
